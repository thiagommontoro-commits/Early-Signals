name: LATAM Executive Weekly Intelligence Pipeline

on:
  schedule:
    # Agenda a execução automática para todas as segundas-feiras às 08:00 AM UTC (05:00 AM Horário de Brasília)
    # Ajuste o cron se precisar que as 08:00 sejam no seu horário local (ex: 11:00 UTC para 08:00 de Brasília)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    # Permite que você execute o script manualmente através do botão "Run workflow" no GitHub se necessário

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Repositório
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Garante o histórico completo para um rebase seguro

    - name: Configurar Ambiente Python
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.10'

    - name: Instalar Dependências Operacionais
      run: |
        python -m pip install --upgrade pip
        # Adicione aqui as bibliotecas que o seu script de raspagem/geração usa, por exemplo:
        # pip install requests beautifulsoup4 pandas

    - name: Executar Pipeline AGCO Early Warning
      run: |
        # Executa o seu script que gera o ficheiro HTML do painel
        python seu_script_gerador.py 

    - name: Sincronizar, Commit e Push via Git Bot
      run: |
        # Configura as credenciais oficiais do bot do GitHub
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Prepara todas as alterações geradas pelo script
        git add .
        
        # Faz o commit apenas se houver ficheiros alterados, evitando quebrar o workflow caso não haja notícias novas
        git commit -m "Auto-update: Painel Early Warning atualizado via Bot" || echo "Nenhuma alteração detetada no painel esta semana."
        
        # SOLUÇÃO DO SEU ERRO: Faz o pull com rebase para trazer as mudanças do servidor e colocar o commit do bot no topo
        git pull origin main --rebase
        
        # Envia as atualizações com o histórico linear e sincronizado
        git push origin main
