name: LATAM Executive Weekly Intelligence Pipeline

on:
  schedule:
    - cron: '0 11 * * 1'
  workflow_dispatch:

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Repositório
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configurar Ambiente Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependências Operacionais
      run: |
        python -m pip install --upgrade pip
        pip install google-genai google-generativeai requests pandas

    - name: Executar Pipeline AGCO Early Warning
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python atualizar_dados.py 

    - name: Sincronizar, Commit e Push via Git Bot
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        git add .
        
        git commit -m "Auto-update: Painel Early Warning atualizado via Bot" || echo "Nenhuma alteração detectada no painel esta semana."
        
        git pull origin main --rebase
        
        git push origin main
