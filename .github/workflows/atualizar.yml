name: LATAM Executive Weekly Intelligence Pipeline

on:
  schedule:
    # 11:00 UTC equivale exatamente a 08:00 da manhã no horário de Brasília
    - cron: '0 11 * * 1'
  workflow_dispatch:
    # Permite rodar manualmente clicando no botão "Run workflow"

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Repositório
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Garante o histórico completo para não dar erro no commit

    - name: Configurar Ambiente Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependências Operacionais
      run: |
        python -m pip install --upgrade pip
        # Se o seu atualizar_dados.py precisar de bibliotecas específicas, tire o # da linha abaixo e coloque os nomes:
        # pip install requests pandas beautifulsoup4

    - name: Executar Pipeline AGCO Early Warning
      run: |
        # Executa o seu script Python com o nome correto
        python atualizar_dados.py 

    - name: Sincronizar, Commit e Push via Git Bot
      run: |
        # Configura a identidade do bot do GitHub
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Prepara todos os arquivos modificados
        git add .
        
        # Faz o commit. Se não tiver notícia nova, ele avisa e não quebra a Action
        git commit -m "Auto-update: Painel Early Warning atualizado via Bot" || echo "Nenhuma alteração detectada no painel esta semana."
        
        # Puxa as atualizações e alinha o histórico (a solução do seu erro de "rejected")
        git pull origin main --rebase
        
        # Envia as atualizações para o GitHub
        git push origin main
