name: AEM Data Receipt Daily Run

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 12 * * *' 

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          pip install google-genai

      - name: Executar o script de atualização
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python atualizar_dados.py

      - name: Salvar (Commit e Push) o novo index.html no GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m "Auto-update: Painel Early Warning atualizado via Bot" || echo "Sem mudanças para commitar"
          git push
