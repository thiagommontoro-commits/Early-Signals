name: AEM Data Receipt Daily Run

on:
  schedule:
    # Ajustado para as 12:00 UTC, que corresponde exatamente às 09:00 AM no horário de Brasília.
    # Roda automaticamente de segunda a sexta-feira.
    - cron: '0 12 * * 1-5'
  workflow_dispatch: # Mantém o botão manual ativado para caso de emergência

permissions:
  contents: write # Garante a permissão necessária para o robô salvar o index.html atualizado

jobs:
  run-aem-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar os arquivos do repositório
        uses: actions/checkout@v4

      - name: Preparar o ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar a inteligência do Google Gemini
        run: pip install google-genai

      - name: Rodar Extração de Inteligência
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python atualizar_dados.py

      - name: Salvar novo Painel HTML no GitHub
        run: |
          git config --global user.name "AEM Radar Automático"
          git config --global user.email "aem-radar@example.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Early Warning: Atualização Diária de Notícias" && git push)
